<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <title>Are We Doing This?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image" href="../favicon.png">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        function subForm(){
            $.ajax({
                url:'https://script.google.com/macros/s/AKfycbwNMH_Zqnfbe08hSUU_WqtInmN4FkzFw-3snOeVO5bvP-sPpym8HgdroZCSkkW5mxzA_Q/exec',
                type:'post',
                data:$("#newPost").serializeArray(),
                success: function(){
                    alert("Your entry has been added!")
                },
                error: function(){
                    alert("Error: entry not submitted.")
                }
            })
        }
        function submitForm(){
            subForm();
            document.getElementById("newPost").reset();
            return false;
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>We're doing this.</h1>
        <div id="newEntry">
            <form id="newPost" method="post" class="form">
                <label for="author">author:</label><br>
                <select id="author" name="author">
                    <option value="Katherine">Katherine</option>
                    <option value="Blake">Blake</option>
                </select>
                <label for="title">title:</label><br>
                <input type="text" id="title" name="title"><br>
                <label for="body">entry:</label><br>
                <textarea id="body" name="body" rows="10"></textarea><br>
                <input type="button" value="submit" id="btnsubmit" onclick="submitForm()"></input>
            </form>
        </div>
    </div>

    <div class="fab-container">
        <div onclick = "location.href='index.html';" class="fab-icon-holder">
            <h4 id="back-icon" class="icon">←</h4>
        </div>
    </div>
</body>
</html>
